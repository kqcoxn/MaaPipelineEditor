name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  package-python:
    name: Test and package LocalBridge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Check product and protocol versions
        run: |
          node scripts/development/migrate-version.mjs --check
          node scripts/development/proto-version.mjs --check
          test "${GITHUB_REF_NAME#v}" = "$(node -p "require('./Desktop/package.json').version")"
      - name: Test LocalBridge
        run: |
          uv sync --project LocalBridge --all-groups --frozen --python 3.12
          uv run --project LocalBridge ruff check LocalBridge/src LocalBridge/tests
          uv run --project LocalBridge pyright -p LocalBridge/pyproject.toml
          uv run --project LocalBridge pytest LocalBridge/tests
      - name: Build sdist and wheel
        run: uv build --project LocalBridge --out-dir dist/localbridge
      - uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/localbridge/*
          if-no-files-found: error

  publish-pypi:
    name: Publish LocalBridge to PyPI
    needs: package-python
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/MaaPipelineEditor-LocalBridge/
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  verify-pypi:
    name: Verify PyPI (${{ matrix.name }})
    needs: publish-pypi
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
          - name: macos-arm64
            os: macos-14
          - name: linux-x64
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Wait for PyPI and install exact version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for attempt in {1..12}; do
            if python -m pip install --no-cache-dir \
              "MaaPipelineEditor-LocalBridge==${VERSION}" pytest; then
              break
            fi
            if [ "$attempt" = 12 ]; then exit 1; fi
            sleep 10
          done
      - name: Verify package metadata and doctor
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python -c "import importlib.metadata as m; assert m.version('MaaPipelineEditor-LocalBridge') == '${VERSION}'"
          python -m mpe_localbridge.cli doctor --json
          python -m pytest -q -m integration LocalBridge/tests/integration

  build-desktop:
    name: Build Desktop (${{ matrix.name }})
    needs: verify-pypi
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            bundles: nsis
          - name: macos-arm64
            os: macos-14
            bundles: dmg
          - name: linux-x64
            os: ubuntu-latest
            bundles: appimage
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: |
            Editor/yarn.lock
            Desktop/yarn.lock
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: Desktop/src-tauri
      - name: Install frontend and Tauri dependencies
        run: |
          yarn editor:install
          yarn desktop:install
      - name: Prepare signed updater configuration
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        run: node scripts/ci/prepare-tauri-release-config.mjs
      - name: Build signed Desktop bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: >-
          yarn --cwd Desktop tauri build
          --config src-tauri/tauri.release.conf.json
          --bundles ${{ matrix.bundles }}
      - name: Stage installers and updater archives
        shell: bash
        run: |
          mkdir -p Desktop/desktop-release
          find Desktop/src-tauri/target/release/bundle -type f \
            \( -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' \
               -o -name '*.tar.gz' -o -name '*.zip' -o -name '*.sig' \) \
            -exec cp '{}' Desktop/desktop-release/ \;
          test -n "$(find Desktop/desktop-release -type f -print -quit)"
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          path: Desktop/desktop-release/*
          if-no-files-found: error

  build-web:
    name: Build web packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: |
            Editor/yarn.lock
            DocumentStation/yarn.lock
            Landing/yarn.lock
      - name: Build stable Editor
        run: |
          yarn editor:install
          sed -i 's/dev: true,/dev: false,/g' Editor/src/stores/configStore.ts
          yarn --cwd Editor build --mode stable
          cd Editor/dist
          zip -r "../../MaaPipelineEditor-${GITHUB_REF_NAME}-stable.zip" .
      - name: Build docs
        run: |
          yarn --cwd DocumentStation install --frozen-lockfile
          yarn --cwd DocumentStation build
          cd DocumentStation/docs/.vitepress/dist
          zip -r "../../../../MaaPipelineEditor-${GITHUB_REF_NAME}-docs.zip" .
      - name: Build landing
        run: |
          yarn --cwd Landing install --frozen-lockfile
          yarn --cwd Landing typecheck
          yarn --cwd Landing build
          cd Landing/dist
          zip -r "../../MaaPipelineEditor-${GITHUB_REF_NAME}-landing.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: web-packages
          path: MaaPipelineEditor-*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release and updater manifest
    needs: [package-python, verify-pypi, build-desktop, build-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: release-artifacts
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: web-packages
          path: release-artifacts
      - uses: actions/download-artifact@v4
        with:
          name: python-package
          path: release-artifacts
      - name: Generate release notes
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          node scripts/ci/render-release-notes.mjs \
            --tag "$GITHUB_REF_NAME" \
            --previous-tag "$PREVIOUS_TAG" \
            --update-logs Editor/src/data/updateLogs.ts \
            --output CHANGELOG.md
      - name: Generate signed updater manifest
        run: |
          node scripts/ci/generate-updater-manifest.mjs \
            --version "${GITHUB_REF_NAME#v}" \
            --tag "$GITHUB_REF_NAME" \
            --repository "$GITHUB_REPOSITORY" \
            --artifacts release-artifacts \
            --notes-file CHANGELOG.md \
            --output latest.json
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*
            latest.json
          body_path: CHANGELOG.md
          generate_release_notes: false
          fail_on_unmatched_files: true
